# Dev-окружение ЭкоПульс. Поднять:
#   cp .env.example .env   # при необходимости поправить значения
#   docker compose up --build
# Бек: http://localhost:8000  ·  Фронт (nginx со статикой): http://localhost:8080
# Postgres проброшен на 5432 для удобства отладки.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dedecolog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dedecolog}
      POSTGRES_DB: ${POSTGRES_DB:-dedecolog}
    volumes:
      - dedecolog_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dedecolog} -d ${POSTGRES_DB:-dedecolog}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind-mount исходников для --reload в dev.
      - ./backend:/app
      - backend_storage:/app/storage
      # Общий токен claude (read-only) для генерации цитаты; CLAUDE_TOKEN_DIR по умолчанию /data.
      - ${CLAUDE_TOKEN_DIR:-/data}:/app/claude-auth:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dedecolog}:${POSTGRES_PASSWORD:-dedecolog}@db:5432/dedecolog
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "8080:80"

  # Макс-бот (long-polling). Под профилем — обычный `up` его не трогает. Включить:
  #   docker compose --profile maxbot up -d --build maxbot
  maxbot:
    build: ./maxbot
    profiles: ["maxbot"]
    depends_on:
      - backend
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      INTAKE_URL: http://backend:8000/api/v1/intake/max
      INTAKE_TOKEN: ${YANDEX_INTAKE_TOKEN:-}
      MAX_GROUP_CHAT_ID: ${MAX_GROUP_CHAT_ID:-}

volumes:
  dedecolog_pgdata:
  backend_storage:
