[pytest]
asyncio_mode = auto
# rootdir в sys.path — иначе `from app...` в conftest падает ModuleNotFoundError.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*
# junit-xml в относительный storage/ — работает и локально, и в контейнере (cwd=/app).
addopts = -v --tb=short --junitxml=storage/test-results.xml
