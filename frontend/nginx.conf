server {
    listen 80;
    server_name _;

    # Лимит размера тела запроса — на уровне server (действует на ВСЕ локации, включая
    # /api/). Дефолт nginx = 1m → приём фото падал 413 уже на >1МБ. 40m = до 3 фото × 10МБ
    # (лимит бэка на файл) + оверхед multipart + запас. Держи ≥ per-file×3 бэка.
    client_max_body_size 40m;
    # ДИАГНОСТИКА: метка, что ответ прошёл через nginx фронт-контейнера (снять после разбора 413).
    add_header X-App-Nginx "frontend" always;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — статика лучше отдаётся пожатой
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # Хешированные ассеты Vite — кешировать надолго
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → бэкенд внутри docker-сети. Тот же origin, что и фронт → без CORS и без домена.
    # ^~ ОБЯЗАТЕЛЕН: иначе regex-локация статики (\.jpg|png|…$) перехватывает отдачу фото
    #   /api/v1/intake/photo/<id>/0.jpg как файл на диске → 404, не доходя до бэка.
    #   ^~ делает префикс /api/ приоритетнее regex-локаций.
    # БЕЗ слэша в конце proxy_pass — префикс /api/ сохраняется (бек смонтирован под /api/v1).
    location ^~ /api/ {
        client_max_body_size 40m;   # дублирует server-level (см. выше) — явно для /api/
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # для логики Secure-cookie на беке
        proxy_read_timeout 120s;
    }

    # App links (диплинки): iOS Universal Links + Android App Links. Отдаём как JSON и
    # БЕЗ SPA-fallback (иначе index.html вместо файла → диплинк-верификация падает). Сами
    # файлы — в frontend/public/.well-known/ → Vite копирует их в dist/.well-known/.
    # apple-app-site-association — без расширения, поэтому явно задаём тип application/json.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        try_files $uri =404;
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
        try_files $uri =404;
    }

    # SPA fallback: React Router отдаёт index.html на любой URL
    location / {
        try_files $uri $uri/ /index.html;
    }
}
