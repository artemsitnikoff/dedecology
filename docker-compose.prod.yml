# Production compose. На VPS (по шагам — см. DEPLOY.md):
#   docker compose -f docker-compose.prod.yml up -d --build db
#   docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
#   docker compose -f docker-compose.prod.yml run --rm backend python -m app.seed
#   docker compose -f docker-compose.prod.yml up -d --build      # поднять всё
#
# Заход по IP на http://<SERVER_IP>:8888 (пока нет домена). ТОЛЬКО порт 8888 открыт наружу:
# nginx фронта проксирует /api/ → backend:8000 внутри compose-сети (тот же origin, без CORS).
# backend и postgres наружу НЕ публикуются. Завтра при домене+HTTPS — общий nginx/Caddy на 80/443
# перед этим контейнером + SESSION_COOKIE_SECURE=True.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dedecolog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis — очередь фоновой синхронизации МНО (arq) + общий прогресс задач между
  # uvicorn-воркерами (--workers 2). Наружу НЕ публикуется.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    # Явный тег образа: worker переиспользует его (build: только у backend) — тогда
    # deploy пересобирает `backend` и обновляет ОБА сервиса, менять deploy.yml не нужно.
    image: dedecology-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dedecolog
      - REDIS_URL=redis://redis:6379/0
    # Наружу НЕ публикуем: доступен по имени `backend:8000` внутри compose-сети (через nginx-прокси
    # фронта). Для отладки на самом сервере можно временно добавить: ports: ["127.0.0.1:8000:8000"].
    # Production: без --reload, 2 worker'а. При мало RAM можно --workers 1.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # arq-воркер фоновой синхронизации МНО. БЕЗ своего build — переиспользует образ
  # `dedecology-backend:latest` (собирается сервисом backend), поэтому deploy `build
  # backend` обновляет и воркер. Миграции/сид — на backend, воркер только исполняет задачи.
  worker:
    image: dedecology-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_storage:/app/storage
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/dedecolog
      - REDIS_URL=redis://redis:6379/0
    command: arq app.worker.WorkerSettings
    # Дать arq дописать текущий батч (и commit) перед SIGKILL при рестарте/деплое.
    # Полный регион за это время не успеет — возобновление дешёвое (skip записанных).
    stop_grace_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        # Ключ Yandex Maps JS API (build-time). Пусто → карта рендерит честную плашку.
        VITE_YANDEX_MAPS_KEY: ${VITE_YANDEX_MAPS_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    # Единственный открытый наружу порт — приложение на http://<SERVER_IP>:8888.
    ports:
      - "8888:80"

  # Макс-бот: long-polling воркер (только исходящие к API Макса, портов наружу нет).
  # ПОД ПРОФИЛЕМ — обычный `up -d` его НЕ трогает (нужен MAX_BOT_TOKEN). Включить вручную:
  #   docker compose -f docker-compose.prod.yml --profile maxbot up -d --build maxbot
  maxbot:
    build: ./maxbot
    restart: unless-stopped
    profiles: ["maxbot"]
    depends_on:
      - backend
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      INTAKE_URL: http://backend:8000/api/v1/intake/max
      INTAKE_TOKEN: ${YANDEX_INTAKE_TOKEN}
      MAX_GROUP_CHAT_ID: ${MAX_GROUP_CHAT_ID:-}

volumes:
  dedecolog_pgdata:
  backend_storage:
  redis_data:
